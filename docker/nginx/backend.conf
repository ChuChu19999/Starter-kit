server {
  listen 80;
  server_tokens off;
	index index.html;

  error_page 500 502 503 504 /custom_50x.html;
  location = /custom_50x.html {
    root /usr/share/nginx/html;
    internal;
  }

  # Backend API
  location /api {
    proxy_pass http://upstream_backend;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Prefix /certs-journal-dev;
    proxy_set_header X-Script-Name /certs-journal-dev;
		proxy_set_header REMOTE_USER $remote_user;
		proxy_set_header X-Remote-User $remote_user;
		proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
		proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
		proxy_set_header X-SSL-Client-S-DN   $ssl_client_s_dn;
		proxy_pass_header Authorization;
  }

  # APISIX
  location /auth/api {
    proxy_pass http://upstream_backend/api;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header REMOTE_USER $remote_user;
		proxy_set_header X-Remote-User $remote_user;
		proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
		proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
		proxy_set_header X-SSL-Client-S-DN   $ssl_client_s_dn;
		proxy_pass_header Authorization;
  }

	# Static files from backend (Swagger UI, etc.)
	location /static/ {
		proxy_pass http://upstream_backend;
		proxy_set_header Host $http_host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}

  location /media/ {
		alias /media/;
		try_files $uri $uri/ =404;
	}

  # Блокируем доступ к фронтенду по пути /starter-kit/ (на случай, если запрос придет напрямую)
  location /starter-kit/ {
    return 404;
  }

	location / {
    # Проверяем Host заголовок - если это api.gd-urengoy.gazprom.ru, блокируем доступ к фронтенду
    if ($http_host = "api.gd-urengoy.gazprom.ru") {
      return 404;
    }
    root   /frontend_static;
    try_files $uri $uri/ /index.html;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE_USER $remote_user;
    proxy_pass_header Authorization;
  }
}
